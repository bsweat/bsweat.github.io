        <h2>Overview</h2>
        <p>OhSINT is TryHackMe's introductory OSINT room. You're given a single image file — a screenshot of the Windows XP default desktop — and tasked with extracting seven pieces of information about a person using only open-source intelligence techniques. No exploitation, no brute force. Just Google, some metadata tools, and a willingness to click around.</p>

        <h2>Step 1 — Pull the EXIF Metadata</h2>
        <p>The image itself looks completely boring. That's the point. The real content is in the metadata baked into the file. Running it through <em>exif.tools</em> (or <code>exiftool</code> on the command line) reveals a useful payload:</p>
        <pre>exiftool WindowsXP.jpg</pre>
        <p>Key fields that came back:</p>
        <ul>
          <li><em>Copyright:</em> OWoodflint</li>
          <li><em>GPS Latitude / Longitude:</em> coordinates embedded in the image</li>
          <li>Encoding software and a few other fields</li>
        </ul>
        <p>The coordinates initially looked promising. They came back in a non-standard format, which seemed to point toward a major city. I tried the obvious answers — the city itself, then a specific neighborhood — both missed. Reformatting the coordinates pointed me somewhere else entirely, and the nearest big city to those coordinates also missed. Lesson: don't anchor too hard on coordinates when other leads are available. Move on.</p>

        <h2>Step 2 — Google the Copyright Holder</h2>
        <p>The copyright field said <em>OWoodflint</em>. That's not a common name. Dropping it into Google surfaced three results at the top of the first page: a Twitter account, a WordPress site, and a GitHub profile. Hitting the top of the SEO like that is a dead giveaway in a CTF — open all three.</p>

        <h2>Step 3 — Twitter → BSSID</h2>
        <p>The Twitter account had a tweet containing a <em>BSSID</em> (a hardware identifier for a specific wireless access point). Easy flag. One down.</p>

        <h2>Step 4 — Wigle.net → City + SSID</h2>
        <p>With the BSSID in hand, I plugged it into <em>Wigle.net</em> — a crowd-sourced database that maps wireless networks across the world. Wigle had that BSSID on file, pinned to a network in <em>London</em>, and returned the SSID of the access point as well. Two more flags knocked out in one lookup.</p>

        <h2>Step 5 — GitHub → Email Address</h2>
        <p>The GitHub profile had an About Me section with his <em>email address</em> sitting right there in plain text. Flag.</p>

        <h2>Step 6 — WordPress → Vacation City</h2>
        <p>His WordPress page mentioned the city he was currently on vacation in. Another flag, right on the surface.</p>

        <h2>Step 7 — The Password (The Hard One)</h2>
        <p>Finding the password was the only part that actually required digging. My first instinct was to look for exploitable vulnerabilities in WordPress — which, fair, there are plenty — but that felt like the wrong layer for a beginner OSINT room. I pulled back and started closer to the surface.</p>

          <li>Went back through his Twitter history and bio. No hits.</li>

        <p>A few pages in, the WordPress site came up under a different URL index than before. The Google preview snippet showed a sentence I hadn't seen on the page — something involving pennies. I opened the page, then <em>Ctrl+F'd the source</em> for that text. It was there — hidden in the page's source as white text on a white background, invisible unless you're actively looking for it.</p>

        <p>And then I typo'd it on submission. The room still counts it as a solve but the personal record shows a red mark that will haunt me.</p>

        <h2>Key Takeaways</h2>

          <li>Don't start at the exploit layer. The answer is almost always in the content first.</li>
        </ul>
      `

        <h2>Overview</h2>
        <p>I wanted hands-on experience with a real vulnerability scanner rather than just reading about them, and <em>OpenVAS by Greenbone</em> kept coming up as the go-to open-source option. So I set up a small VirtualBox lab, pointed it at a deliberately broken target, and let it rip. Here's what I found — and what I learned.</p>

        <h2>Lab Setup</h2>
        <p>The environment was straightforward: two VMs on an isolated virtual network inside VirtualBox.</p>
        <ul>
          <li><em>Kali Linux</em> — attacker machine, running OpenVAS (Greenbone Community Edition)</li>
          <li><em>Metasploitable 2</em> — the intentionally vulnerable target</li>
        </ul>
        <p>After getting both machines updated and able to reach each other, I confirmed connectivity with a quick ping and moved on to recon.</p>

        <h2>Reconnaissance</h2>
        <p>Nmapping Metasploitable is always humbling — it returns a wall of open ports that would give any sysadmin a headache:</p>
        <pre>nmap -sV -sC --open &lt;TARGET_IP&gt;</pre>
        <p>The output confirmed the target was alive, listening on dozens of ports, and very much vulnerable. With a solid picture of the attack surface, it was time to hand things off to the scanner.</p>

        <h2>Running the Scan</h2>
        <p>In the OpenVAS web UI (accessible at <em>https://localhost:9392</em>), I created a new task targeting Metasploitable's IP and selected the <em>Full and Fast</em> scan configuration — the broadest standard option, which tests all ports and runs the full NVT plugin library against the findings.</p>
        <p>The scan ran for about <em>15 minutes</em>, methodically working through every open port. The full report is linked below.</p>
        <p><a href="documents/metasploitableReport.pdf" target="_blank">→ View the OpenVAS scan report (PDF)</a></p>

        <h2>Results: 23 High-Severity Findings</h2>
        <p>The idea of having to remediate a network this bad is genuinely overwhelming. OpenVAS surfaced <em>23 "High" severity vulnerabilities</em>, plus a longer tail of mediums and lows. The good news: roughly half of the criticals have straightforward fixes.</p>
        <ul>
          <li>Outdated services with known CVEs → <em>update from vendor</em></li>
          <li>Default credentials still active (admin:admin, postgres:postgres) → <em>change immediately</em></li>

        <p>Many of these are easy to verify after remediation — patch a service, confirm the old credentials fail, mark it closed. The screaming red flags are often the easiest to eliminate once you know what you're looking for.</p>

        <p>One finding stood out: <em>CVE-2011-3556</em>, a weakness in Java's Remote Method Invocation (RMI) registry. This one earns its severity — it allows an attacker to achieve <em>remote code execution via server-side request forgery</em> by deserializing a crafted payload against the RMI registry.</p>

# 2. Open a listener for the incoming RMI connection
nc -lvnp 4444
# 3. Open a listener for the reverse shell
nc -lvnp 4445
# 4. Send the payload to the remote RMI service
# 5. Catch the shell</pre>

        <h2>Why Active Directory Matters</h2>
        <p>Active Directory is the identity backbone of most corporate Windows environments. It manages users, computers, groups, and policies across an organization. From an attacker's perspective, <em>compromising AD means compromising everything</em>. Understanding how it gets abused is essential whether you're on offense or defense.</p>

        <h2>LLMNR Poisoning</h2>
        <p>LLMNR (Link-Local Multicast Name Resolution) is a protocol Windows uses when DNS fails. If a machine tries to resolve a hostname that doesn't exist, it broadcasts a request to the entire network. An attacker listening on the network can respond first, capturing the victim's <em>NTLMv2 hash</em>.</p>
        <p>Tool: <em>Responder</em></p>
        <pre>sudo python3 Responder.py -I eth0 -wv</pre>
        <p>Crack the captured hash offline with Hashcat:</p>
        <pre>hashcat -m 5600 captured.txt /usr/share/wordlists/rockyou.txt</pre>
        <p><em>Defense:</em> Disable LLMNR and NBT-NS via Group Policy. If you don't use them, there's no reason to leave them on.</p>

        <h2>Kerberoasting</h2>
        <p>Any authenticated domain user can request a Kerberos service ticket for any Service Principal Name (SPN). That ticket is encrypted with the service account's password hash — which means you can take it offline and crack it.</p>
        <pre># Request all SPNs with Impacket
GetUserSPNs.py domain/user:password -dc-ip &lt;DC_IP&gt; -request</pre>
        <p>Then crack with Hashcat (-m 13100 for Kerberoast hashes).</p>
        <p><em>Defense:</em> Use strong, random passwords (25+ chars) on service accounts. Audit SPNs regularly — any account with one is a target.</p>

        <h2>Pass-the-Hash</h2>
        <p>Windows often stores NTLM hashes in memory. If you've compromised one machine and dumped hashes, you can use those hashes directly to authenticate to other machines — <em>no password cracking needed</em>.</p>
        <pre># With CrackMapExec
crackmapexec smb &lt;TARGET_IP&gt; -u Administrator -H &lt;NTLM_HASH&gt;</pre>
        <p><em>Defense:</em> Enable Protected Users security group for privileged accounts. Implement Credential Guard on Windows 10+ endpoints to prevent LSASS memory dumps.</p>

        <h2>Quick Reference: Tools for AD Attacks</h2>
        <ul>
          <li><em>BloodHound</em> — maps AD relationships and finds attack paths to Domain Admin</li>
          <li><em>Impacket</em> — Python toolkit for SMB, Kerberos, and LDAP attacks</li>

          <li><em>Mimikatz</em> — credential dumping from Windows memory (LSASS)</li>

        <h2>The Basics (That Everyone Knows)</h2>
        <pre># Service version detection + default scripts
nmap -sV -sC &lt;TARGET&gt;

# Aggressive scan (OS detection, version, scripts, traceroute)
nmap -A &lt;TARGET&gt;</pre>
        <p>These are fine for learning but slow in practice. Here's what I actually reach for.</p>

        <h2>My Go-To Initial Scan</h2>
        <p>Fast full-port scan first, then detailed scan on what's open:</p>
        <pre># Step 1 — find all open ports quickly
nmap -p- --min-rate 5000 -T4 &lt;TARGET&gt; -oN ports.txt

# Step 2 — detailed scan on discovered ports only
nmap -sV -sC -p 22,80,443,8080 &lt;TARGET&gt; -oN detailed.txt</pre>
        <p>Running -p- with --min-rate 5000 hits all 65535 ports fast. Then you do the slow, thorough scan only on ports that are actually open. Saves significant time.</p>

        <h2>Useful Flags I Reach For Often</h2>
        <ul>
          <li><em>-sU</em> — UDP scan. Often skipped, but DNS (53), SNMP (161), and TFTP (69) only show up here.</li>
          <li><em>-O</em> — OS detection. Requires root. Useful for identifying Windows vs Linux targets quickly.</li>
          <li><em>-Pn</em> — skip host discovery (ping). Use when ICMP is blocked — common on CTF targets and hardened hosts.</li>
          <li><em>-oA output</em> — save results in all formats (normal, XML, grepable) at once. Always do this.</li>
          <li><em>--open</em> — only show open ports. Cuts clutter when scanning subnets.</li>
        </ul>

        <h2>NSE Scripts Worth Knowing</h2>
        <pre># SMB vulnerability check (MS17-010, EternalBlue)
nmap --script smb-vuln-ms17-010 -p 445 &lt;TARGET&gt;

# Full SMB enumeration
nmap --script smb-enum-shares,smb-enum-users -p 445 &lt;TARGET&gt;

# HTTP enumeration
nmap --script http-enum -p 80,443 &lt;TARGET&gt;

# FTP anonymous login check
nmap --script ftp-anon -p 21 &lt;TARGET&gt;

# Run all vuln scripts (noisy but thorough)
nmap --script vuln &lt;TARGET&gt;</pre>

        <h2>Timing Templates</h2>
        <ul>
          <li><em>-T1 / -T2</em> — slow, stealthy. Useful for evading IDS in real engagements.</li>
          <li><em>-T3</em> — default. Balanced speed and reliability.</li>
          <li><em>-T4</em> — faster. Fine for CTFs and lab environments where stealth doesn't matter.</li>
          <li><em>-T5</em> — insane speed. Can miss results on unreliable networks.</li>

nmap -sn 192.168.1.0/24

# Quick port scan across a subnet

        <div class="note"><strong>// Reminder:</strong> Save your output every time with -oA. There's nothing worse than finding something interesting and not having the scan results to reference later.</div>

        <p>I studied for about 6 weeks, roughly an hour a day with heavier sessions on weekends. My approach:</p>
